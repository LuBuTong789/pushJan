<template>
  <!-- 仿微信文件卡片 -->
  <div class="wechat-file-card" v-if="showFile">
    <div class="file-icon">文件</div>
    <div class="file-info">{{ fileName }}</div>
    <button @click="downloadFile" class="download-btn">下载</button>
  </div>
</template>

<script setup>
  import axios from 'axios'
  import { ref } from 'vue'

  const fileName = ref("测试文档.pdf")
  const showFile = ref(true)

  // 下载文件
  const downloadFile = async () => {
    try {
      const res = await axios.get(`/download/${fileName.value}`, {
        responseType: 'blob'
      })
      const url = window.URL.createObjectURL(new Blob([res.data]))
      const a = document.createElement('a')
      a.href = url
      a.download = fileName.value
      a.click()
      window.URL.revokeObjectURL(url)
    } catch (e) {
      alert('下载失败')
    }
  }
</script>
