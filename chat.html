<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 智能聊天</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ========== 全局样式重置与基础配置 ========== */
    /* 重置所有元素的默认边距、内边距，统一盒模型 */
    * {
      margin: 0;
      padding: 0;
      /* 盒模型：宽高包含边框和内边距，避免布局偏移 */
      box-sizing: border-box;
    }

    /* 页面主体样式 */
    body {
      /* 设置字体（Inter无衬线字体，适配现代界面） */
      font-family: 'Inter', sans-serif;
      /* 页面背景：135度渐变（深蓝→紫蓝→深紫），营造科技感 */
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
      /* 最小高度占满视口，避免内容不足时背景不全 */
      min-height: 100vh;
      /* Flex布局：让聊天卡片垂直+水平居中 */
      display: flex;
      align-items: center;
      justify-content: center;
      /* 页面左右内边距，适配小屏幕 */
      padding: 20px;
    }

    /* ========== 背景悬浮球体动效（装饰用） ========== */
    /* 球体基础样式：固定定位、圆形、模糊、半透明、层级置底 */
    .orb {
      position: fixed;
      /* 固定在页面，滚动不位移 */
      border-radius: 50%;
      /* 圆形 */
      filter: blur(80px);
      /* 高斯模糊，营造光晕效果 */
      opacity: 0.3;
      /* 半透明，不抢主体视觉 */
      z-index: -1;
      /* 置于底层，不遮挡其他元素 */
      /* 浮动动画：20秒无限循环，缓入缓出 */
      animation: float 20s infinite ease-in-out;
    }

    /* 第一个球体样式：尺寸、颜色、位置 */
    .orb-1 {
      width: 400px;
      height: 400px;
      background: #7c3aed;
      /* 淡紫色 */
      top: -100px;
      /* 左上偏移，只显示一部分 */
      left: -100px;
    }

    /* 第二个球体样式：尺寸、颜色、位置、动画延迟 */
    .orb-2 {
      width: 300px;
      height: 300px;
      background: #db2777;
      /* 玫红色 */
      bottom: -50px;
      /* 右下偏移 */
      right: -50px;
      animation-delay: -10s;
      /* 动画延迟10秒，和第一个球体动效错开 */
    }

    /* 球体浮动动画关键帧：0%/100%原位，50%偏移 */
    @keyframes float {

      0%,
      100% {
        transform: translate(0, 0);
        /* 初始/结束位置 */
      }

      50% {
        transform: translate(30px, -30px);
        /* 中间位置：右移30px，上移30px */
      }
    }

    /* ========== 核心聊天卡片容器 ========== */
    .chat-card {
      width: 100%;
      /* 宽度自适应 */
      max-width: 480px;
      /* 最大宽度，适配大屏 */
      height: 700px;
      /* 固定高度 */
      /* 玻璃拟态背景：深灰半透明 + 毛玻璃模糊 */
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(20px);
      /* 毛玻璃效果（需浏览器支持） */
      /* 边框：白色半透明细边框，增强玻璃感 */
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      /* 大圆角，柔和风格 */
      /* 阴影：深色投影，增强立体感 */
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      /* Flex垂直布局：头部→消息区→输入区自上而下排列 */
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* 隐藏溢出内容，避免圆角失效 */
    }

    /* ========== 聊天卡片头部样式 ========== */
    .header {
      padding: 20px 24px;
      /* 内边距 */
      background: rgba(255, 255, 255, 0.05);
      /* 浅透明背景 */
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      /* 底部分隔线 */
      display: flex;
      /* Flex布局：头像+名称+按钮横向排列 */
      align-items: center;
      /* 垂直居中 */
      gap: 12px;
      /* 元素间距 */
    }

    /* AI头像样式 */
    .avatar {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      /* 绿色渐变 */
      border-radius: 14px;
      /* 圆角矩形 */
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      /* 粗体 */
      color: white;
      font-size: 14px;
      position: relative;
      /* 用于定位在线状态小点 */
    }

    此处废弃了已经头像右下角在线状态小点（伪元素） */ .avatar::after {
      content: '';
      /* 伪元素必须有content */
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 10px;
      height: 10px;
      background: #10b981;
      /* 绿色，代表在线 */
      border: 2px solid #1e293b;
      /* 深色边框，突出小点 */
      border-radius: 50%;
      /* 圆形 */
    }

    /* 在线状态小圆点 */
    .status-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      /* 绿色 */
      border-radius: 50%;
      animation: pulse 2s infinite;
      /* 呼吸动画 */
    }

    /* 呼吸动画关键帧：透明度变化 */
    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        /* 不透明 */
      }

      50% {
        opacity: 0.5;
        /* 半透明 */
      }
    }

    /* ========== 消息展示区域样式 ========== */
    .messages {
      flex: 1;
      /* 占满卡片剩余高度 */
      overflow-y: auto;
      /* 垂直滚动（消息过多时） */
      padding: 24px;
      /* 内边距 */
      display: flex;
      flex-direction: column;
      /* 消息垂直排列 */
      gap: 16px;
      /* 消息间距 */
    }

    /* 自定义滚动条：宽度 */
    .messages::-webkit-scrollbar {
      width: 4px;
    }

    /* 自定义滚动条：滑块样式 */
    .messages::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.3);
      /* 淡紫色半透明 */
      border-radius: 2px;
      /* 圆角 */
    }

    /* ========== 消息气泡通用样式 ========== */
    .message {
      max-width: 85%;
      /* 最大宽度，避免气泡过宽 */
      animation: slideIn 0.3s ease-out;
      /* 消息滑入动画 */
    }

    /* 消息滑入动画：从下往上渐显 */
    @keyframes slideIn {
      from {
        opacity: 0;
        /* 初始透明 */
        transform: translateY(10px);
        /* 初始下移10px */
      }

      to {
        opacity: 1;
        /* 最终不透明 */
        transform: translateY(0);
        /* 最终归位 */
      }
    }

    /* 用户消息：右对齐 */
    .message-user {
      align-self: flex-end;
    }

    /* AI消息：左对齐 */
    .message-ai {
      align-self: flex-start;
    }

    /* 气泡基础样式 */
    .bubble {
      padding: 14px 18px;
      /* 内边距 */
      font-size: 14px;
      /* 字体大小 */
      line-height: 1.6;
      /* 行高，增强可读性 */
      word-wrap: break-word;
      /* 自动换行，避免长文本溢出 */
    }

    /* 用户气泡样式：渐变背景、圆角、白色文字 */
    .bubble-user {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      /* 紫蓝色渐变 */
      color: white;
      /* 圆角：右上/右下/左下/左上 → 自定义气泡圆角（用户消息右下角直角） */
      border-radius: 20px 20px 4px 20px;
    }

    /* AI气泡样式：玻璃背景、圆角、浅灰文字 */
    .bubble-ai {
      background: rgba(51, 65, 85, 0.8);
      /* 深灰半透明 */
      color: #e2e8f0;
      /* 浅灰色文字 */
      /* 圆角：左上/右上/右下/左下 → AI消息左下角直角 */
      border-radius: 20px 20px 20px 4px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      /* 细边框增强玻璃感 */
    }

    /* 消息时间样式 */
    .time {
      font-size: 11px;
      /* 小字体 */
      color: #64748b;
      /* 灰色 */
      margin-top: 4px;
      /* 上间距 */
      text-align: right;
      /* 右对齐 */
    }

    /* 用户消息时间：紫色调，和用户气泡呼应 */
    .message-user .time {
      color: #818cf8;
    }

    /* ========== 打字动效样式 ========== */
    .typing {
      display: flex;
      /* 圆点横向排列 */
      gap: 4px;
      /* 圆点间距 */
      padding: 20px 18px;
      /* 内边距，和普通气泡一致 */
    }

    /* 打字圆点样式 */
    .typing-dot {
      width: 6px;
      height: 6px;
      background: #6366f1;
      /* 紫色，和主题呼应 */
      border-radius: 50%;
      /* 圆形 */
      /* 打字动画：无限循环 */
      animation: typing 1.4s infinite ease-in-out both;
    }

    /* 第一个圆点：动画延迟-0.32秒 */
    .typing-dot:nth-child(1) {
      animation-delay: -0.32s;
    }

    /* 第二个圆点：动画延迟-0.16秒 */
    .typing-dot:nth-child(2) {
      animation-delay: -0.16s;
    }

    /* 打字动画关键帧：缩放变化 */
    @keyframes typing {

      0%,
      80%,
      100% {
        transform: scale(0);
        /* 缩小到消失 */
      }

      40% {
        transform: scale(1);
        /* 放大显示 */
      }
    }

    /* ========== 输入区域样式 ========== */
    .input-area {
      padding: 20px 24px;
      /* 内边距 */
      background: rgba(255, 255, 255, 0.03);
      /* 浅透明背景 */
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      /* 顶部分隔线 */
    }

    /* 输入框容器：Flex布局 */
    .input-wrapper {
      display: flex;
      gap: 12px;
      /* 输入框和按钮间距 */
      align-items: center;
      /* 垂直居中 */
    }

    /* 输入框样式 */
    .input-box {
      flex: 1;
      /* 占满剩余宽度 */
      background: rgba(15, 23, 42, 0.6);
      /* 深灰半透明 */
      border: 1px solid rgba(255, 255, 255, 0.1);
      /* 细边框 */
      border-radius: 16px;
      /* 圆角 */
      padding: 14px 18px;
      /* 内边距 */
      color: white;
      /* 白色文字 */
      font-size: 14px;
      /* 字体大小 */
      outline: none;
      /* 去掉默认聚焦边框 */
      transition: all 0.3s;
      /* 过渡动画（聚焦时） */
    }

    /* 输入框聚焦样式：边框变色+外发光 */
    .input-box:focus {
      border-color: #6366f1;
      /* 紫色边框 */
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
      /* 淡紫色外发光 */
    }

    /* 输入框占位符样式 */
    .input-box::placeholder {
      color: #64748b;
      /* 灰色 */
    }

    /* 发送按钮样式 */
    .send-btn {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      /* 紫蓝色渐变 */
      border: none;
      /* 去掉默认边框 */
      border-radius: 14px;
      /* 圆角 */
      color: white;
      /* 白色图标 */
      cursor: pointer;
      /* 鼠标悬浮变手型 */
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      /* 过渡动画 */
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
      /* 投影增强立体感 */
    }

    /* 发送按钮悬浮样式：上移+投影变大 */
    .send-btn:hover {
      transform: translateY(-2px);
      /* 上移2px */
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
      /* 投影放大 */
    }

    /* 发送按钮点击样式：归位 */
    .send-btn:active {
      transform: translateY(0);
    }

    /* 发送按钮禁用样式：半透明+禁止手型+取消动画 */
    .send-btn:disabled {
      opacity: 0.5;
      /* 半透明 */
      cursor: not-allowed;
      /* 禁止手型 */
      transform: none;
      /* 取消位移 */
    }

    /* ========== 初始欢迎语样式 ========== */
    .welcome {
      text-align: center;
      /* 文字居中 */
      padding: 40px 20px;
      /* 内边距 */
      color: #64748b;
      /* 灰色文字 */
    }

    /* 欢迎语图标容器 */
    .welcome-icon {
      width: 64px;
      height: 64px;
      background: rgba(99, 102, 241, 0.1);
      /* 淡紫色透明背景 */
      border-radius: 20px;
      /* 圆角 */
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      /* 水平居中+下间距 */
      color: #6366f1;
      /* 紫色图标 */
      font-size: 28px;
      /* 图标大小 */
    }
  </style>
</head>

<body>
  <!-- 背景动效：悬浮球体元素（装饰用） -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- 核心聊天卡片容器：包含整个聊天界面的主体 -->
  <div class="chat-card">
    <!-- 聊天卡片头部：显示AI头像、名称、在线状态 -->
    <div class="header">
      <!-- AI头像区域 -->
      <div class="avatar">star</div>
      <!-- 名称和状态容器（flex:1 占满剩余宽度） -->
      <div style="flex: 1;">
        <!-- 智能助手名称 -->
        <div style="font-weight: 600; color: white; font-size: 16px;">Stars</div>
        <!-- 在线状态行：包含状态点和文字 -->
        <div style="display: flex; align-items: center; gap: 6px; margin-top: 2px;">
          <!-- 在线状态小圆点 -->
          <div class="status-dot"></div>
          <!-- 在线状态文字 -->
          <span style="font-size: 12px; color: #10b981;">在线</span>
        </div>
      </div>
      <!-- 更多操作按钮（三点图标） -->
      <button
        style="width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.05); border: none; color: #94a3b8; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s;"
        onmouseover="this.style.background='rgba(255,255,255,0.1)'"
        onmouseout="this.style.background='rgba(255,255,255,0.05)'" onclick="disconnectWebSocket()"> <!-- 新增：点击断开WS -->
        <!-- 替换为刷新图标，新增旋转动效类 -->
        <i class="fas fa-sync" style="transition: transform 0.3s;"></i>
      </button>
    </div>

    <!-- 聊天消息展示区域：显示欢迎语、用户/AI的聊天记录 -->
    <div class="messages" id="messages">
      <!-- 初始欢迎语模块：页面加载时显示的默认提示 -->
      <div class="welcome">
        <div style="font-size: 16px; font-weight: 600; color: #7dc39e; margin-bottom: 8px;">元气满满!!!</div>
        <div class="welcome-icon">
          <i class="fas fa-robot"></i>
        </div>
        <!-- 欢迎语标题 -->
        <div style="font-size: 18px; font-weight: 600; color: #e2e8f0; margin-bottom: 8px;">你好！我是 AI 助手</div>
        <!-- 欢迎语说明文字 -->
        <div style="font-size: 13px; line-height: 1.6;">有什么我可以帮你的吗？<br>随时向我提问</div>
      </div>
    </div>

    <!-- 输入区域容器11：包含消息输入框和发送按钮 -->
    <div class="input-area">
      <!-- 输入表单：绑定了提交事件（对应之前的JS逻辑） -->
      <form class="input-wrapper" id="chatForm">
        <!-- 消息输入框：用户输入聊天内容的地方 -->
        <input type="text" class="input-box" id="messageInput" placeholder="输入消息..." autocomplete="off">
        <!-- 发送按钮：提交表单发送消息 -->
        <button type="submit" class="send-btn" id="sendBtn">
          <i class="fas fa-paper-plane"></i> <!-- 纸飞机图标（代表发送） -->
        </button>
      </form>
    </div>
  </div>
</body>

<script>
  // 页面打开自动执行登录校验
  checkLogin()
  function checkLogin() {
    const token = localStorage.getItem('authToken')
    if (!token) location.href = 'index.html'
  }

  // 获取DOM元素
  const messagesContainer = document.getElementById('messages');
  const chatForm = document.getElementById('chatForm');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  // 全局保存SSE对象，防止重复连接
  let eventSource = null;

  // 转义HTML，防止XSS
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // 滚动到底部
  function scrollToBottom() {
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  // 添加消息到窗口
  function addMessage(text, isUser = false) {
    // 修复：选择器错误（注释掉或改成正确类名）
    // const welcome = messagesContainer.querySelector('.welcome');
    // if (welcome) welcome.remove();

    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${isUser ? 'message-user' : 'message-ai'}`;
    const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    messageDiv.innerHTML = `
      <div class="bubble ${isUser ? 'bubble-user' : 'bubble-ai'}">${escapeHtml(text)}</div>
      <div class="time">${time}</div>
    `;
    messagesContainer.appendChild(messageDiv);
    scrollToBottom();
  }

  // 显示AI输入中
  function showTyping() {
    const typing = document.getElementById('typingIndicator');
    if (typing) return; // 防止重复创建

    const typingDiv = document.createElement('div');
    typingDiv.className = 'message message-ai';
    typingDiv.id = 'typingIndicator';
    typingDiv.innerHTML = `
      <div class="bubble bubble-ai typing">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    messagesContainer.appendChild(typingDiv);
    scrollToBottom();
  }

  // 隐藏AI输入中
  function hideTyping() {
    const typing = document.getElementById('typingIndicator');
    if (typing) typing.remove();
  }

  // 核心：发送消息 + SSE连接
  function sendMessage(message) {
    // 1. 先添加用户消息
    addMessage(message, true);

    // 2. 显示AI输入中
    showTyping();

    // 3. 关闭旧的SSE连接
    if (eventSource) {
      eventSource.close();
    }

    // 4. 建立新SSE
    const url = `http://localhost:8009/stream/deepseekclient?question=${encodeURIComponent(message)}`;
    eventSource = new EventSource(url);

    // 5. 接收流式数据
    eventSource.onmessage = function (event) {
      hideTyping(); // 收到第一条数据就隐藏输入提示
      // 找到最后一个AI消息，追加内容
      const lastAiMsg = messagesContainer.querySelector('.message-ai:last-child .bubble');
      if (lastAiMsg) {
        lastAiMsg.innerHTML += escapeHtml(event.data);
      } else {
        // 没有就新建
        addMessage(event.data, false);
      }
      scrollToBottom();
    };

    // 6. 错误/完成处理
    eventSource.onerror = function () {
      eventSource.close();
      hideTyping();
      sendBtn.disabled = false;
    };

    // 7. SSE结束关闭连接
    eventSource.onclose = function () {
      eventSource.close();
      sendBtn.disabled = false;
    };
  }

  // 表单提交处理
  chatForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = messageInput.value.trim();
    if (!text || sendBtn.disabled) return;

    // 发送消息
    sendMessage(text);

    // 清空输入框
    messageInput.value = '';
    // 禁用按钮防止重复发送
    sendBtn.disabled = true;
    messageInput.focus();
  });

  // 页面加载聚焦
  messageInput.focus();
</script>


</html>
