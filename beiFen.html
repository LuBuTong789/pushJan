<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 智能聊天</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Animated background orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      z-index: -1;
      animation: float 20s infinite ease-in-out;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: #7c3aed;
      top: -100px;
      left: -100px;
    }

    .orb-2 {
      width: 300px;
      height: 300px;
      background: #db2777;
      bottom: -50px;
      right: -50px;
      animation-delay: -10s;
    }

    @keyframes float {

      0%,
      100% {
        transform: translate(0, 0);
      }

      50% {
        transform: translate(30px, -30px);
      }
    }

    /* Glass card */
    .chat-card {
      width: 100%;
      max-width: 480px;
      height: 700px;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 20px 24px;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
      font-size: 14px;
      position: relative;
    }

    .avatar::after {
      content: '';
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 10px;
      height: 10px;
      background: #10b981;
      border: 2px solid #1e293b;
      border-radius: 50%;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.3);
      border-radius: 2px;
    }

    /* Message bubbles */
    .message {
      max-width: 85%;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-user {
      align-self: flex-end;
    }

    .message-ai {
      align-self: flex-start;
    }

    .bubble {
      padding: 14px 18px;
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
    }

    .bubble-user {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      border-radius: 20px 20px 4px 20px;
    }

    .bubble-ai {
      background: rgba(51, 65, 85, 0.8);
      color: #e2e8f0;
      border-radius: 20px 20px 20px 4px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .time {
      font-size: 11px;
      color: #64748b;
      margin-top: 4px;
      text-align: right;
    }

    .message-user .time {
      color: #818cf8;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 4px;
      padding: 20px 18px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: #6366f1;
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out both;
    }

    .typing-dot:nth-child(1) {
      animation-delay: -0.32s;
    }

    .typing-dot:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes typing {

      0%,
      80%,
      100% {
        transform: scale(0);
      }

      40% {
        transform: scale(1);
      }
    }

    /* Input area */
    .input-area {
      padding: 20px 24px;
      background: rgba(255, 255, 255, 0.03);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .input-box {
      flex: 1;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 14px 18px;
      color: white;
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
    }

    .input-box:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .input-box::placeholder {
      color: #64748b;
    }

    .send-btn {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border: none;
      border-radius: 14px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
    }

    .send-btn:active {
      transform: translateY(0);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: #64748b;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      color: #6366f1;
      font-size: 28px;
    }
  </style>
</head>

<body>
  <!-- Background effects -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Chat Card -->
  <div class="chat-card">
    <!-- Header -->
    <div class="header">
      <div class="avatar">AI</div>
      <div style="flex: 1;">
        <div style="font-weight: 600; color: white; font-size: 16px;">智能助手</div>
        <div style="display: flex; align-items: center; gap: 6px; margin-top: 2px;">
          <div class="status-dot"></div>
          <span style="font-size: 12px; color: #10b981;">在线</span>
        </div>
      </div>
      <button
        style="width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.05); border: none; color: #94a3b8; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s;"
        onmouseover="this.style.background='rgba(255,255,255,0.1)'"
        onmouseout="this.style.background='rgba(255,255,255,0.05)'">
        <i class="fas fa-ellipsis-v"></i>
      </button>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-icon">
          <i class="fas fa-robot"></i>
        </div>
        <div style="font-size: 18px; font-weight: 600; color: #e2e8f0; margin-bottom: 8px;">你好！我是 AI 助手</div>
        <div style="font-size: 13px; line-height: 1.6;">有什么我可以帮你的吗？<br>随时向我提问</div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <form class="input-wrapper" id="chatForm">
        <input type="text" class="input-box" id="messageInput" placeholder="输入消息..." autocomplete="off">
        <button type="submit" class="send-btn" id="sendBtn">
          <i class="fas fa-paper-plane"></i>
        </button>
      </form>
    </div>
  </div>

  <script>
    const messagesContainer = document.getElementById('messages');
    const chatForm = document.getElementById('chatForm');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    const aiResponses = [
      '我理解您的意思，让我为您详细解答...',
      '这是一个很好的问题！根据我的分析...',
      '收到！我已经记录了您的需求。',
      '从专业角度来看，我建议您考虑以下几个方面...',
      '没问题，我可以帮您处理这个任务。',
      '感谢您的提问，让我查询一下相关信息...',
      '根据最新数据，答案是肯定的。',
      '我需要更多信息来给出准确的建议。'
    ];

    // Add message to chat
    function addMessage(text, isUser = false) {
      // Remove welcome if exists
      const welcome = messagesContainer.querySelector('.welcome');
      if (welcome) welcome.remove();

      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'message-user' : 'message-ai'}`;

      const time = new Date().toLocaleTimeString('zh-CN', {
        hour: '2-digit',
        minute: '2-digit'
      });

      messageDiv.innerHTML = `
                <div class="bubble ${isUser ? 'bubble-user' : 'bubble-ai'}">
                    ${escapeHtml(text)}
                </div>
                <div class="time">${time}</div>
            `;

      messagesContainer.appendChild(messageDiv);
      scrollToBottom();
    }

    // Show typing indicator
    function showTyping() {
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message message-ai';
      typingDiv.id = 'typingIndicator';
      typingDiv.innerHTML = `
                <div class="bubble bubble-ai typing">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
      messagesContainer.appendChild(typingDiv);
      scrollToBottom();
    }

    // Remove typing indicator
    function hideTyping() {
      const typing = document.getElementById('typingIndicator');
      if (typing) typing.remove();
    }

    // Scroll to bottom
    function scrollToBottom() {
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Handle submit
    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = messageInput.value.trim();
      if (!text) return;

      // Add user message
      addMessage(text, true);
      messageInput.value = '';
      sendBtn.disabled = true;

      // Simulate AI typing
      showTyping();

      // Random delay for realism
      await new Promise(r => setTimeout(r, 1000 + Math.random() * 1000));

      hideTyping();

      // Add AI response
      const response = aiResponses[Math.floor(Math.random() * aiResponses.length)];
      addMessage(response, false);

      sendBtn.disabled = false;
      messageInput.focus();
    });

    // Auto-focus input
    messageInput.focus();
  </script>
</body>

</html>
