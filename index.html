<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Input Experience</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow: hidden;
      background-color: #0f172a;
    }

    /* Dynamic Animated Background */
    .bg-mesh {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      background: radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
        radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
        radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
      background-size: 200% 200%;
      animation: gradient-move 15s ease infinite;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.6;
      animation: float 10s infinite ease-in-out;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: #7c3aed;
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 300px;
      height: 300px;
      background: #db2777;
      bottom: -50px;
      right: -50px;
      animation-delay: -2s;
    }

    .orb-3 {
      width: 200px;
      height: 200px;
      background: #2563eb;
      top: 40%;
      left: 40%;
      animation-delay: -4s;
    }

    @keyframes gradient-move {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translate(0, 0);
      }

      50% {
        transform: translate(30px, -30px);
      }
    }

    /* 3D Tilt Card Styles */
    .card-container {
      perspective: 1000px;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
    }

    /* Input Styling */
    .custom-input {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      transition: all 0.3s ease;
    }

    .custom-input:focus {
      background: rgba(0, 0, 0, 0.4);
      border-color: #818cf8;
      box-shadow: 0 0 20px rgba(129, 140, 248, 0.3);
      outline: none;
    }

    /* Button Styling */
    .submit-btn {
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .submit-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: 0.5s;
    }

    .submit-btn:hover::after {
      left: 100%;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(168, 85, 247, 0.5);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    /* Shake Animation for Error */
    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      10%,
      30%,
      50%,
      70%,
      90% {
        transform: translateX(-5px);
      }

      20%,
      40%,
      60%,
      80% {
        transform: translateX(5px);
      }
    }

    .shake {
      animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
    }

    /* Success Checkmark */
    .checkmark__circle {
      stroke-dasharray: 166;
      stroke-dashoffset: 166;
      stroke-width: 2;
      stroke-miterlimit: 10;
      stroke: #4ade80;
      fill: none;
      animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    .checkmark {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: block;
      stroke-width: 2;
      stroke: #fff;
      stroke-miterlimit: 10;
      margin: 10% auto;
      box-shadow: inset 0px 0px 0px #4ade80;
      animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
    }

    .checkmark__check {
      transform-origin: 50% 50%;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
    }

    @keyframes stroke {
      100% {
        stroke-dashoffset: 0;
      }
    }

    @keyframes scale {

      0%,
      100% {
        transform: none;
      }

      50% {
        transform: scale3d(1.1, 1.1, 1);
      }
    }

    @keyframes fill {
      100% {
        box-shadow: inset 0px 0px 0px 30px #4ade80;
      }
    }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen text-slate-200 selection:bg-indigo-500 selection:text-white">

  <!-- Background Elements -->
  <div class="bg-mesh"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Main Card Container -->
  <div class="card-container w-full max-w-md px-6">
    <div id="tiltCard" class="glass-card rounded-2xl p-8 relative">

      <!-- Header -->
      <div class="text-center mb-8 transform translate-z-10">
        <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-200 to-pink-200 mb-2">
          欢迎回来
        </h1>
        <p class="text-sm text-slate-400">请输入您的凭证我们一起交互，😁</p>
      </div>



      <!-- Form Content 
      <div id="formContent">
        <form id="mainForm" class="space-y-6" novalidate>
          <div class="relative group">
            <label for="userInput"
              class="block text-xs font-medium text-indigo-300 mb-1 ml-1 uppercase tracking-wider">请输入校验码</label>
            <input type="text" id="userInput"
              class="custom-input w-full px-4 py-3 rounded-xl text-lg placeholder-slate-500" placeholder="在此输入内容..."
              autocomplete="off">
            <div class="absolute bottom-0 left-0 h-0.5 bg-gradient-to-r from-indigo-500
            -->
      <div id="formContent">
        <form id="mainForm" class="space-y-6" novalidate>
          <div class="relative group">
            <label for="userInput"
              class="block text-xs font-medium text-indigo-300 mb-1 ml-1 uppercase tracking-wider">请输入校验码</label>
            <input type="text" id="userInput"
              class="custom-input w-full px-4 py-3 rounded-xl text-lg placeholder-slate-500" placeholder="在此输入内容..."
              autocomplete="off">
            <div class="absolute bottom-0 left-0 h-0.5 bg-gradient-to-r from-indigo-500 to-purple-500 w-full"></div>
          </div>
          <div class="flex justify-center">
            <button type="submit"
              class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl font-medium transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
              提交验证
            </button>
          </div>
          <div id="errorMessage" class="text-red-400 text-sm text-center min-h-5"></div>
        </form>
      </div>


      <script>
        const form = document.getElementById('mainForm');
        const userInput = document.getElementById('userInput');
        const errorMessage = document.getElementById('errorMessage');

        // 表单提交事件处理
        form.addEventListener('submit', async function (e) {
          e.preventDefault();

          const code = userInput.value.trim();

          // 输入验证
          if (!code) {
            showError('请输入校验码');
            return;
          }

          // 禁用按钮防止重复提交
          const submitBtn = form.querySelector('button[type="submit"]');
          const originalText = submitBtn.textContent;
          submitBtn.disabled = true;
          submitBtn.textContent = '验证中...';

          try {
            // 【核心修复1】单引号改反引号，让${code}正常替换；添加encodeURIComponent处理特殊字符
            const response = await fetch(`http://localhost:8001/api/common/auth/check?code=${encodeURIComponent(code)}`, {
              method: 'get',
              headers: {
                'Accept': 'application/json' // 告诉后端期望JSON响应，避免解析失败
              }
            });

            // 解析后端响应（无论状态码是否2xx，先解析JSON）
            const data = await response.json();

            // 【核心修复2】结合后端Result类的code判断业务结果（而非仅靠response.ok）
            if (data.code === 200) {
              // 校验成功，获取 token 并跳转
              const token = data.token;
              if (token) {
                // 存储 token 到本地
                localStorage.setItem('authToken', token);
                // 跳转到目标页面
                window.location.href = 'http://baidu.com'; // 替换为实际跳转地址
              } else {
                showError('校验成功但未获取到Token，请重试');
              }
            } else {
              // 业务校验失败（如401未授权）
              showError(data.msg || '校验失败，请重试');
            }

          } catch (error) {
            // 捕获网络错误、JSON解析错误等异常
            showError('网络请求出错，请稍后再试');
            console.error('请求异常详情：', error);
          } finally {
            // 【核心修复3】finally块恢复按钮状态，避免分支遗漏
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
          }
        });

        // 错误提示函数（补充样式显示，确保用户能看到）
        function showError(msg) {
          errorMessage.textContent = msg;
          errorMessage.style.display = 'block'; // 确保错误信息可见
          errorMessage.style.color = 'red'; // 可选：设置红色提示
          // 5秒后自动清空错误信息
          setTimeout(() => {
            errorMessage.textContent = '';
            errorMessage.style.display = 'none';
          }, 5000);
        }
      </script>
